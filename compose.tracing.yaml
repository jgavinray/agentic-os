services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: agent-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  orchestrator:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
