model_list:
  - model_name: qwen36-27b
    litellm_params:
      model: openai/qwen36-27b
      api_base: http://192.168.0.33:8000/v1
      api_key: local-key
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      timeout: 300
      stream_timeout: 300
  - model_name: agentic/strong-prefix-canary
    litellm_params:
      model: openai/qwen36-27b
      api_base: os.environ/AGENTIC_STRONG_PREFIX_CANARY_API_BASE
      api_key: os.environ/AGENTIC_STRONG_PREFIX_CANARY_API_KEY
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      timeout: 300
      stream_timeout: 300
    model_info:
      id: agentic-strong-prefix-canary
      base_model: qwen36-27b
      mode: chat
      input_cost_per_token: 0
      output_cost_per_token: 0
      cache_backend: prefix-canary


general_settings:
  master_key: sk-local-agentstack

litellm_settings:
  # Local OpenAI-compatible models don't support the Responses API (/v1/responses).
  # This forces /v1/messages calls to route through chat/completions instead,
  # preventing LiteLLM ≥1.84 from breaking multi-turn conversations.
  use_chat_completions_url_for_anthropic_messages: true
  # Claude Code sends Anthropic-specific params (reasoning_effort, context_management)
  # that OpenAI-compatible local models don't support. Drop them silently.
  drop_params: true

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 300
