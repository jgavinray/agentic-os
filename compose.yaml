include:
  - compose.total-recall.yaml

services:
  postgres:
    # Pinned from postgres:16 on 2026-05-18.
    image: postgres@sha256:b6ccf02e9b47eac0d67b5eaa0ef56fd59163bffa5506f64e96ceb5053130ec86
    container_name: agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpass
      POSTGRES_DB: agentstack
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentstack"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    # Pinned from qdrant/qdrant:latest on 2026-05-18.
    image: qdrant/qdrant@sha256:b3063c673f3973877c038eeecc392bad5011f072ee7892b56c9a8e204a3bdea9
    container_name: agent-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; read -r line <&3; case \"$$line\" in *200*) exit 0;; *) exit 1;; esac'"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  litellm:
    # Pinned from docker.litellm.ai/berriai/litellm:main-stable on 2026-05-18.
    image: docker.litellm.ai/berriai/litellm@sha256:2e8517e2bed423c50ab7e40fb1ac0a9cbe62a764e9d65161d871fb6a9bf75a2d
    container_name: agent-litellm
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://agent:agentpass@postgres:5432/agentstack
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY:?LITELLM_SALT_KEY must be set in .env - generate with: openssl rand -hex 32}"
      STORE_MODEL_IN_DB: "True"
      AGENTIC_STRONG_PREFIX_CANARY_API_BASE: "${AGENTIC_STRONG_PREFIX_CANARY_API_BASE:-http://192.168.0.33:8000/v1}"
      AGENTIC_STRONG_PREFIX_CANARY_API_KEY: "${AGENTIC_STRONG_PREFIX_CANARY_API_KEY:-local-key}"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command:
      - "--config=/app/config.yaml"
      - "--port=4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=5).read()\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  summarizer:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: agent-summarizer
    restart: unless-stopped
    volumes:
      - ./models/summarizer:/models:ro
    ports:
      - "${SUMMARIZER_PORT:-8089}:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - "-m"
      - "${SUMMARIZER_MODEL_PATH:-/models/qwen2.5-3b-instruct-q4_k_m.gguf}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-c"
      - "${SUMMARIZER_CTX_SIZE:-4096}"
      - "-n"
      - "${SUMMARIZER_PREDICT_TOKENS:-384}"
      - "-t"
      - "${SUMMARIZER_THREADS:-16}"
      - "-tb"
      - "${SUMMARIZER_THREADS_BATCH:-16}"
      - "-ngl"
      - "${SUMMARIZER_GPU_LAYERS:-0}"
      - "--parallel"
      - "${SUMMARIZER_PARALLEL:-1}"

  orchestrator:
    build:
      context: ./orchestrator
    container_name: agentic-os-orchestrator
    restart: unless-stopped
    depends_on:
      - postgres
      - qdrant
      - litellm
      - summarizer
    ports:
      - "8088:8088"
    volumes:
      - ./models:/data/models:ro
    environment:
      DATABASE_URL: postgresql://agent:agentpass@postgres:5432/agentstack
      CAPTURE_DATABASE_URL: "${CAPTURE_DATABASE_URL:-postgresql://agent:agentpass@postgres:5432/agentstack_capture}"
      QDRANT_URL: http://qdrant:6333
      LITELLM_URL: http://litellm:4000/v1
      LITELLM_KEY: sk-local-agentstack
      API_KEYS: sk-local-orchestrator,agent-os;sk-agent-clean-001,agent-os-clean-001;sk-agent-clean-002,agent-os-clean-002;sk-crusoe,crusoe
      DEFAULT_MODEL: glm-4.5-air
      DEFAULT_MAX_TOKENS: "${DEFAULT_MAX_TOKENS:-8192}"
      MAX_MAX_TOKENS: "${MAX_MAX_TOKENS:-32768}"
      LITELLM_REQUEST_TIMEOUT_SECS: "${LITELLM_REQUEST_TIMEOUT_SECS:-900}"
      DEFAULT_TASK: engineering
      SUMMARIZER_ENABLED: "${SUMMARIZER_ENABLED:-true}"
      SUMMARIZER_BASE_URL: "${SUMMARIZER_BASE_URL:-http://summarizer:8080/v1}"
      SUMMARIZER_MODEL: "${SUMMARIZER_MODEL:-qwen2.5-3b-instruct-q4_k_m}"
      TOTAL_RECALL_URL: "${TOTAL_RECALL_URL:-http://total-recall:8811}"
      VLLM_METRICS_URL: "${VLLM_METRICS_URL:-http://192.168.0.33:8000/metrics}"
      SUMMARIZER_MAX_TOKENS: "${SUMMARIZER_MAX_TOKENS:-384}"
      BACKGROUND_WORK_CONCURRENCY: "${BACKGROUND_WORK_CONCURRENCY:-4}"
      CONTEXT_CACHE_TTL_MS: "${CONTEXT_CACHE_TTL_MS:-300000}"
      CONTEXT_DECAY_RATE: "${CONTEXT_DECAY_RATE:-0.006}"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-60}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-30}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      EMBED_MODEL_PATH: /data/models/embed
      SENTIMENT_MODEL_PATH: /data/models/sentiment
      SENTIMENT_THRESHOLD: "${SENTIMENT_THRESHOLD:-0.70}"
      PREFIX_CACHE_CANARY_ENABLED: "${PREFIX_CACHE_CANARY_ENABLED:-false}"
      PREFIX_CACHE_CANARY_NAMESPACE_ALLOWLIST: "${PREFIX_CACHE_CANARY_NAMESPACE_ALLOWLIST:-}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
